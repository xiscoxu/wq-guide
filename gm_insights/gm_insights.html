<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GM 心得专区 – WorldQuant BRAIN</title>
    <link rel="stylesheet" href="../assets/style.css">
    <style>
        /* ===== Password Gate ===== */
        #password-gate {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0f1117 0%, #1a1f2e 50%, #0f1117 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .gate-box {
            background: rgba(22, 27, 42, 0.95);
            border: 1px solid rgba(88, 166, 255, 0.3);
            border-radius: 16px;
            padding: 48px 40px;
            width: 400px;
            max-width: 90vw;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }
        .gate-logo { font-size: 48px; margin-bottom: 16px; }
        .gate-title { font-size: 24px; font-weight: 700; color: #58a6ff; margin-bottom: 8px; }
        .gate-subtitle { font-size: 14px; color: #8b949e; margin-bottom: 32px; }
        .gate-input {
            width: 100%; padding: 14px 16px; font-size: 16px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px; color: #e1e4e8; outline: none;
            letter-spacing: 2px; margin-bottom: 16px; text-align: center;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .gate-input:focus { border-color: #58a6ff; box-shadow: 0 0 0 3px rgba(88,166,255,0.15); }
        .gate-btn {
            width: 100%; padding: 14px; font-size: 16px; font-weight: 600;
            background: linear-gradient(135deg, #1f6feb, #388bfd); color: white;
            border: none; border-radius: 10px; cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }
        .gate-btn:hover { opacity: 0.9; }
        .gate-btn:active { transform: scale(0.98); }
        .gate-error { color: #f85149; font-size: 13px; margin-top: 12px; min-height: 20px; }

        /* ===== Main Content ===== */
        #main-content { display: none; }

        /* ===== Post Card ===== */
        .post-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            margin-bottom: 48px;
            overflow: hidden;
            scroll-margin-top: 72px;
        }
        .post-card-header {
            background: linear-gradient(135deg, rgba(31,111,235,0.12), transparent);
            border-bottom: 1px solid var(--border);
            padding: 20px 28px;
            display: flex;
            align-items: flex-start;
            gap: 14px;
        }
        .post-number {
            background: linear-gradient(135deg, #1f6feb, #388bfd);
            color: white; font-weight: 700; font-size: 12px;
            padding: 3px 10px; border-radius: 20px; white-space: nowrap; margin-top: 4px;
        }
        .post-card-title { font-size: 18px; font-weight: 700; line-height: 1.4; color: var(--text); }
        .post-body-content {
            padding: 24px 28px;
            line-height: 1.8; font-size: 14px; color: var(--muted);
        }
        .post-body-content p { margin-bottom: 12px; }
        .post-body-content h1, .post-body-content h2, .post-body-content h3 {
            color: var(--text); margin: 18px 0 8px; font-weight: 600;
        }
        .post-body-content h2 { font-size: 17px; }
        .post-body-content h3 { font-size: 15px; color: var(--accent); }
        .post-body-content a { color: var(--link); text-decoration: none; }
        .post-body-content a:hover { text-decoration: underline; }
        .post-body-content img {
            max-width: 100%; height: auto; border-radius: 8px;
            margin: 10px 0; border: 1px solid var(--border); display: block;
        }
        .post-body-content blockquote {
            border-left: 3px solid #388bfd; margin: 14px 0;
            padding: 8px 16px; background: rgba(56,139,253,0.06);
            border-radius: 0 8px 8px 0; color: var(--muted);
        }
        .post-body-content ul, .post-body-content ol { padding-left: 22px; margin-bottom: 12px; }
        .post-body-content li { margin-bottom: 5px; line-height: 1.7; }
        .post-body-content pre, .post-body-content code {
            background: rgba(0,0,0,0.3); border: 1px solid var(--border);
            border-radius: 6px; padding: 2px 6px;
            font-family: "SFMono-Regular", Consolas, monospace; font-size: 13px;
        }
        .post-body-content pre { padding: 14px; overflow-x: auto; margin: 12px 0; }
        .post-body-content strong { color: var(--text); font-weight: 600; }
        .post-body-content hr { border: none; border-top: 1px solid var(--border); margin: 18px 0; }

        /* ===== Comments ===== */
        .comments-section {
            border-top: 1px solid var(--border);
            padding: 20px 28px;
        }
        .comments-title {
            font-size: 13px; font-weight: 600; color: var(--muted);
            margin-bottom: 16px; letter-spacing: 0.05em; text-transform: uppercase;
        }
        .comment-item {
            border-left: 2px solid rgba(88,166,255,0.2);
            padding: 0 0 14px 14px; margin-bottom: 14px;
        }
        .comment-item:last-child { margin-bottom: 0; padding-bottom: 0; }
        .comment-content { font-size: 13px; line-height: 1.7; color: var(--muted); }
        .comment-content p { margin-bottom: 6px; }
        .comment-content p:last-child { margin-bottom: 0; }
        .comment-content img {
            max-width: 100%; border-radius: 6px;
            margin: 6px 0; border: 1px solid var(--border);
        }
        .comment-content a { color: var(--link); text-decoration: none; }
    </style>
</head>
<body>

<!-- Password Gate -->
<div id="password-gate">
    <div class="gate-box">
        <div class="gate-logo">🏆</div>
        <div class="gate-title">GM 心得专区</div>
        <div class="gate-subtitle">WorldQuant BRAIN · Grand Master 经验分享</div>
        <input type="password" id="pw-input" class="gate-input" placeholder="请输入访问密码" autocomplete="off">
        <button class="gate-btn" onclick="checkPassword()">进入专区</button>
        <div class="gate-error" id="gate-error"></div>
    </div>
</div>

<!-- Main Content -->
<div id="content-wrapper"></div>

    function checkPassword() {
        var pw = document.getElementById('pw-input').value.trim();
        try {
            var decrypted = CryptoJS.AES.decrypt(CIPHERTEXT, pw);
            var html = decrypted.toString(CryptoJS.enc.Utf8);
            if (!html) throw new Error('empty');
            var wrapper = document.getElementById('content-wrapper');
            wrapper.innerHTML = html;
            var mc = document.getElementById('main-content');
            if (mc) mc.style.display = 'block';
            document.getElementById('password-gate').style.display = 'none';
            document.getElementById('back-to-top').style.display = 'flex';
        } catch(e) {
            var err = document.getElementById('gate-error');
            err.textContent = '密码错误，请重试';
            document.getElementById('pw-input').value = '';
            document.getElementById('pw-input').focus();
        }
    }

    document.getElementById('pw-input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') checkPassword();
    });

    window.addEventListener('scroll', function() {
        var btn = document.getElementById('back-to-top');
        if (btn) btn.style.display = window.scrollY > 400 ? 'flex' : 'none';
    });
</script>
