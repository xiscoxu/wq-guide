<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 – WorldQuant BRAIN 培训中心</title>
<link rel="stylesheet" href="assets/style.css">
<style>
  body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .auth-box {
    background:var(--card); border:1px solid var(--border); border-radius:16px;
    padding:40px 36px; width:420px; max-width:92vw;
  }
  .auth-logo { font-size:40px; text-align:center; margin-bottom:12px; }
  .auth-title { font-size:22px; font-weight:700; color:var(--accent); text-align:center; margin-bottom:4px; }
  .auth-sub { font-size:13px; color:var(--muted); text-align:center; margin-bottom:28px; }
  .tabs { display:flex; gap:0; border-bottom:1px solid var(--border); margin-bottom:24px; }
  .tab-btn {
    flex:1; padding:10px; font-size:14px; background:none; border:none; color:var(--muted);
    cursor:pointer; border-bottom:2px solid transparent; transition:all 0.15s;
  }
  .tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }
  .form-group { margin-bottom:16px; }
  .form-group label { display:block; font-size:12px; color:var(--muted); margin-bottom:6px; }
  .form-group input {
    width:100%; padding:10px 12px; background:rgba(255,255,255,0.04);
    border:1px solid var(--border); border-radius:8px; color:var(--text);
    font-size:14px; outline:none; box-sizing:border-box;
    transition:border-color 0.15s;
  }
  .form-group input:focus { border-color:var(--accent); }
  .form-hint { font-size:11px; color:var(--muted); margin-top:4px; }
  .submit-btn {
    width:100%; padding:12px; background:var(--accent); color:#000; font-weight:700;
    border:none; border-radius:8px; cursor:pointer; font-size:15px; margin-top:8px;
  }
  .submit-btn:hover { opacity:0.9; }
  .msg { font-size:13px; text-align:center; margin-top:14px; min-height:20px; }
  .msg.error { color:#f85149; }
  .msg.success { color:var(--accent); }
  #register-form { display:none; }
</style>
</head>
<body>
<div class="auth-box">
  <div class="auth-logo">⚡</div>
  <div class="auth-title">BRAIN 培训中心</div>
  <div class="auth-sub">WorldQuant 顾问专属学习平台</div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('login')">登录</button>
    <button class="tab-btn" onclick="switchTab('register')">注册</button>
  </div>

  <!-- 登录表单 -->
  <form id="login-form" onsubmit="doLogin(event)">
    <div class="form-group">
      <label>用户名</label>
      <input type="text" id="l-user" required placeholder="用户名">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="l-pw" required placeholder="••••••••">
    </div>
    <button class="submit-btn" type="submit">登录</button>
    <div class="msg" id="login-msg"></div>
  </form>

  <!-- 注册表单 -->
  <form id="register-form" onsubmit="doRegister(event)">
    <div class="form-group">
      <label>用户名</label>
      <input type="text" id="r-name" required placeholder="登录用户名">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="r-pw" required placeholder="至少 8 位">
    </div>
    <div class="form-group">
      <label>你的 WorldQuant ID</label>
      <input type="text" id="r-wqid" required placeholder="如 WQ123456">
    </div>
    <div class="form-group">
      <label>推荐人 WorldQuant ID</label>
      <input type="text" id="r-ref" required placeholder="填写推荐人的 WQ ID">
      <div class="form-hint">仅接受特定推荐人的注册申请</div>
    </div>
    <button class="submit-btn" type="submit">提交注册申请</button>
    <div class="msg" id="register-msg"></div>
  </form>
</div>

<script>
var API = 'https://brainauth.shop';

function switchTab(t) {
  document.getElementById('login-form').style.display    = t === 'login'    ? 'block' : 'none';
  document.getElementById('register-form').style.display = t === 'register' ? 'block' : 'none';
  document.querySelectorAll('.tab-btn').forEach(function(b, i) {
    b.classList.toggle('active', (i === 0) === (t === 'login'));
  });
}

function doLogin(e) {
  e.preventDefault();
  var msg = document.getElementById('login-msg');
  msg.textContent = '登录中...'; msg.className = 'msg';
  fetch(API + '/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      username: document.getElementById('l-user').value,
      password: document.getElementById('l-pw').value
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    if (d.token) {
      sessionStorage.setItem('brain_token', d.token);
      sessionStorage.setItem('brain_user', d.username);
      sessionStorage.setItem('brain_role', d.role);
      var rawNext = new URLSearchParams(location.search).get('next') || '';
      // 只允许跳转到同源相对路径，防止开放重定向
      var next = (rawNext && rawNext.startsWith('/') && !rawNext.startsWith('//')) ? rawNext : 'index.html';
      location.href = next;
    } else {
      msg.textContent = d.detail || '登录失败'; msg.className = 'msg error';
    }
  })
  .catch(function() { msg.textContent = '无法连接服务器'; msg.className = 'msg error'; });
}

function doRegister(e) {
  e.preventDefault();
  var msg = document.getElementById('register-msg');
  msg.textContent = '提交中...'; msg.className = 'msg';
  fetch(API + '/api/register', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      username:       document.getElementById('r-name').value,
      password:       document.getElementById('r-pw').value,
      wq_id:          document.getElementById('r-wqid').value,
      referrer_wq_id: document.getElementById('r-ref').value
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    if (d.message) { msg.textContent = d.message; msg.className = 'msg success'; }
    else { msg.textContent = d.detail || '注册失败'; msg.className = 'msg error'; }
  })
  .catch(function() { msg.textContent = '无法连接服务器'; msg.className = 'msg error'; });
}
</script>
</body>
</html>
